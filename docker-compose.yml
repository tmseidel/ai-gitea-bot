services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GITEA_URL: ${GITEA_URL:?Set GITEA_URL}
      GITEA_TOKEN: ${GITEA_TOKEN:?Set GITEA_TOKEN}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-20250514}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-4096}
      AI_MAX_DIFF_CHARS_PER_CHUNK: ${AI_MAX_DIFF_CHARS_PER_CHUNK:-120000}
      AI_MAX_DIFF_CHUNKS: ${AI_MAX_DIFF_CHUNKS:-8}
      AI_RETRY_TRUNCATED_CHUNK_CHARS: ${AI_RETRY_TRUNCATED_CHUNK_CHARS:-60000}
      AI_ANTHROPIC_API_URL: ${AI_ANTHROPIC_API_URL:-https://api.anthropic.com}
      AI_ANTHROPIC_API_KEY: ${AI_ANTHROPIC_API_KEY:-}
      AI_ANTHROPIC_API_VERSION: ${AI_ANTHROPIC_API_VERSION:-2023-06-01}
      AI_OPENAI_API_URL: ${AI_OPENAI_API_URL:-https://api.openai.com}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:-}
      AI_OLLAMA_API_URL: ${AI_OLLAMA_API_URL:-http://localhost:11434}
      PROMPTS_DIR: /app/prompts
      BOT_USERNAME: ${BOT_USERNAME:-ai_bot}
      DATABASE_URL: jdbc:postgresql://db:5432/giteabot
      DATABASE_USERNAME: ${DATABASE_USERNAME:-giteabot}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-giteabot}
    volumes:
      - ./prompts:/app/prompts:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: giteabot
      POSTGRES_USER: ${DATABASE_USERNAME:-giteabot}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-giteabot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-giteabot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
