spring.application.name=Anthropic Gitea Bot Test

# Gitea
gitea.url=http://localhost:3000
gitea.token=test-token

# Anthropic
anthropic.api.url=http://localhost:8081
anthropic.api.key=test-api-key
anthropic.api.version=2023-06-01
anthropic.model=claude-sonnet-4-20250514
anthropic.max-tokens=1024
anthropic.max-diff-chars-per-chunk=5000
anthropic.max-diff-chunks=4
anthropic.retry-truncated-chunk-chars=2000

# Prompts
prompts.dir=${java.io.tmpdir}/test-prompts
prompts.definitions.default.file=default.md

# Bot
bot.alias=@claude_bot

# Database (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
