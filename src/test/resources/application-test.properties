spring.application.name=AI Gitea Bot Test

# Gitea
gitea.url=http://localhost:3000
gitea.token=test-token

# AI Provider
ai.provider=anthropic
ai.model=claude-sonnet-4-20250514
ai.max-tokens=1024
ai.max-diff-chars-per-chunk=5000
ai.max-diff-chunks=4
ai.retry-truncated-chunk-chars=2000

# Anthropic-specific (used when ai.provider=anthropic)
ai.anthropic.api-url=http://localhost:8081
ai.anthropic.api-key=test-api-key
ai.anthropic.api-version=2023-06-01

# OpenAI-specific (used when ai.provider=openai)
ai.openai.api-url=http://localhost:8082
ai.openai.api-key=test-openai-key

# Ollama-specific (used when ai.provider=ollama)
ai.ollama.api-url=http://localhost:11434

# Prompts
prompts.dir=${java.io.tmpdir}/test-prompts
prompts.definitions.default.file=default.md

# Bot
bot.username=ai_bot

# Agent
agent.enabled=false
agent.max-files=10
agent.branch-prefix=ai-agent/

# Database (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
