spring.application.name=AI Gitea Bot Test

# Prompts
prompts.dir=${java.io.tmpdir}/test-prompts
prompts.definitions.default.file=default.md

# Agent
agent.enabled=false
agent.max-files=10
agent.branch-prefix=ai-agent/

# Database (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Encryption
app.encryption-key=test-encryption-key-for-tests

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
