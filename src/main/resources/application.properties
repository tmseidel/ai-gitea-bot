spring.application.name=AI Gitea Bot

# Gitea
gitea.url=${GITEA_URL:http://localhost:3000}
gitea.token=${GITEA_TOKEN:}

# AI Provider: "anthropic", "openai", "ollama", or "llamacpp"
ai.provider=${AI_PROVIDER:anthropic}
ai.model=${AI_MODEL:claude-sonnet-4-20250514}
ai.max-tokens=${AI_MAX_TOKENS:4096}
ai.max-diff-chars-per-chunk=${AI_MAX_DIFF_CHARS_PER_CHUNK:120000}
ai.max-diff-chunks=${AI_MAX_DIFF_CHUNKS:8}
ai.retry-truncated-chunk-chars=${AI_RETRY_TRUNCATED_CHUNK_CHARS:60000}

# Anthropic-specific
ai.anthropic.api-url=${AI_ANTHROPIC_API_URL:https://api.anthropic.com}
ai.anthropic.api-key=${AI_ANTHROPIC_API_KEY:}
ai.anthropic.api-version=${AI_ANTHROPIC_API_VERSION:2023-06-01}

# OpenAI-specific
ai.openai.api-url=${AI_OPENAI_API_URL:https://api.openai.com}
ai.openai.api-key=${AI_OPENAI_API_KEY:}

# Ollama-specific
ai.ollama.api-url=${AI_OLLAMA_API_URL:http://localhost:11434}

# llama.cpp server-specific
ai.llamacpp.api-url=${AI_LLAMACPP_API_URL:http://localhost:8081}

# Prompts
prompts.dir=${PROMPTS_DIR:prompts}
prompts.definitions.default.file=${PROMPTS_DEFAULT_FILE:default.md}
prompts.definitions.agent.file=${PROMPTS_AGENT_FILE:agent.md}
prompts.definitions.local-llm.file=${PROMPTS_LOCAL_LLM_FILE:local-llm.md}

# Bot
bot.username=${BOT_USERNAME:ai_bot}

# Agent (Issue Implementation)
agent.enabled=${AGENT_ENABLED:true}
agent.max-files=${AGENT_MAX_FILES:20}
agent.max-tokens=${AGENT_MAX_TOKENS:32768}
agent.branch-prefix=${AGENT_BRANCH_PREFIX:ai-agent/}
# Maximum chars of file content in prompts (reduce for local models with smaller context)
# For cloud providers (Claude/GPT-4): 100000
# For local models with 16k context: 20000
agent.max-file-content-chars=${AGENT_MAX_FILE_CONTENT_CHARS:100000}
# agent.allowed-repos=owner/repo1,owner/repo2

# Agent Validation (iterative error correction)
agent.validation.enabled=${AGENT_VALIDATION_ENABLED:true}
agent.validation.max-retries=${AGENT_VALIDATION_MAX_RETRIES:3}
agent.validation.build-enabled=${AGENT_VALIDATION_BUILD_ENABLED:false}
agent.validation.build-timeout-seconds=${AGENT_VALIDATION_BUILD_TIMEOUT:300}

# Database (H2 for local development; override with PostgreSQL for production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:giteabot;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false
management.info.build.enabled=true
management.info.java.enabled=false
management.info.os.enabled=false

# Info
info.app.name=${spring.application.name}

# Server
server.port=8080

# Logging - Set to DEBUG to see full AI communication
logging.level.org.remus.giteabot.ai=DEBUG
logging.level.org.remus.giteabot.agent=DEBUG

