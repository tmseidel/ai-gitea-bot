spring.application.name=Anthropic Gitea Bot

# Gitea
gitea.url=${GITEA_URL:http://localhost:3000}
gitea.token=${GITEA_TOKEN:}

# Anthropic
anthropic.api.url=${ANTHROPIC_API_URL:https://api.anthropic.com}
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.version=${ANTHROPIC_API_VERSION:2023-06-01}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:4096}
anthropic.max-diff-chars-per-chunk=${ANTHROPIC_MAX_DIFF_CHARS_PER_CHUNK:120000}
anthropic.max-diff-chunks=${ANTHROPIC_MAX_DIFF_CHUNKS:8}
anthropic.retry-truncated-chunk-chars=${ANTHROPIC_RETRY_TRUNCATED_CHUNK_CHARS:60000}

# Prompts
prompts.dir=${PROMPTS_DIR:prompts}
prompts.definitions.default.file=${PROMPTS_DEFAULT_FILE:default.md}

# Bot
bot.alias=${BOT_ALIAS:@claude_bot}

# Database (H2 for local development; override with PostgreSQL for production)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:giteabot;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false
management.info.build.enabled=true
management.info.java.enabled=false
management.info.os.enabled=false

# Info
info.app.name=${spring.application.name}

# Server
server.port=8080
