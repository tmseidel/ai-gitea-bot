<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout :: layout('Bots', ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-cpu"></i> Bots</h2>
            <a th:href="@{/bots/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> New Bot
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${#lists.isEmpty(bots)}" class="text-center py-4">
                    <i class="bi bi-inbox fs-1 text-muted"></i>
                    <p class="text-muted mt-2">No bots configured yet.</p>
                    <a th:href="@{/bots/new}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Create your first bot
                    </a>
                </div>
                <div th:if="${!#lists.isEmpty(bots)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Username</th>
                                <th>AI Integration</th>
                                <th>Git Integration</th>
                                <th>Enabled</th>
                                <th>Agent</th>
                                <th>Webhook URL</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="bot : ${bots}">
                                <td th:text="${bot.name}"></td>
                                <td th:text="${bot.username}"></td>
                                <td th:text="${bot.aiIntegration.name}"></td>
                                <td th:text="${bot.gitIntegration.name}"></td>
                                <td>
                                    <span th:if="${bot.enabled}" class="badge bg-success">Enabled</span>
                                    <span th:if="${!bot.enabled}" class="badge bg-secondary">Disabled</span>
                                </td>
                                <td>
                                    <span th:if="${bot.agentEnabled}" class="badge bg-info">Enabled</span>
                                    <span th:if="${!bot.agentEnabled}" class="badge bg-secondary">Disabled</span>
                                </td>
                                <td>
                                    <span th:if="${bot.webhookPath != null}" class="font-monospace small">
                                        <code th:text="${bot.webhookPath}"></code>
                                        <button type="button" class="btn btn-sm btn-link p-0 ms-1 copy-btn"
                                                th:data-copy="${bot.webhookPath}" title="Copy to clipboard">
                                            <i class="bi bi-clipboard"></i>
                                        </button>
                                    </span>
                                    <span th:if="${bot.webhookPath == null}" class="text-muted">Not set</span>
                                </td>
                                <td>
                                    <div class="btn-group-with-gap btn-group-sm">
                                        <a th:href="@{/bots/{id}/edit(id=${bot.id})}"
                                           class="btn btn-outline-primary">
                                            <i class="bi bi-pencil"></i> Edit
                                        </a>
                                        <form th:action="@{/bots/{id}/delete(id=${bot.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Are you sure you want to delete this bot?');">
                                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                                <i class="bi bi-trash"></i> Delete
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.copy-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var webhookPath = this.getAttribute('data-copy');
                navigator.clipboard.writeText(webhookPath).then(function () {
                    btn.innerHTML = '<i class="bi bi-check"></i>';
                    setTimeout(function () { btn.innerHTML = '<i class="bi bi-clipboard"></i>'; }, 2000);
                });
            });
        });
    });
</script>
</body>
</html>
