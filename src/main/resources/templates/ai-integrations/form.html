<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout :: layout(${integration.id != null ? 'Edit AI Integration' : 'New AI Integration'}, ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-stars"></i>
                <span th:if="${integration.id != null}">Edit AI Integration</span>
                <span th:if="${integration.id == null}">New AI Integration</span>
            </h2>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/ai-integrations/save}" method="post" th:object="${integration}">
                    <input type="hidden" th:if="${integration.id != null}" th:field="*{id}"/>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   placeholder="e.g. My OpenAI Integration" required/>
                        </div>
                        <div class="col-md-6">
                            <label for="providerType" class="form-label">Provider Type</label>
                            <select class="form-select" id="providerType" th:field="*{providerType}" required>
                                <option value="">Select a provider...</option>
                                <option th:each="type : ${providerTypes}"
                                        th:value="${type}" th:text="${type}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="apiUrl" class="form-label">API URL</label>
                            <input type="url" class="form-control" id="apiUrl" th:field="*{apiUrl}"
                                   placeholder="e.g. https://api.openai.com" required/>
                            <div class="form-text" id="apiUrlHint"></div>
                        </div>
                        <div class="col-md-6">
                            <label for="apiKey" class="form-label">API Key</label>
                            <input type="password" class="form-control" id="apiKey" name="apiKey"
                                   placeholder="Enter API key"/>
                            <div th:if="${integration.id != null}" class="form-text">
                                Leave blank to keep current API key.
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="apiVersion" class="form-label">API Version</label>
                            <input type="text" class="form-control" id="apiVersion" th:field="*{apiVersion}"
                                   placeholder="e.g. 2024-02-15-preview (optional)"/>
                        </div>
                        <div class="col-md-6">
                            <label for="model" class="form-label">Model</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="model" th:field="*{model}"
                                       placeholder="e.g. gpt-4o, claude-sonnet-4-6" required/>
                                <button class="btn btn-outline-secondary dropdown-toggle" type="button"
                                        id="modelDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false"
                                        style="display: none;">
                                    Select
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end" id="modelDropdownMenu">
                                </ul>
                            </div>
                            <div class="form-text" id="modelHint"></div>
                        </div>

                        <div class="col-md-3">
                            <label for="maxTokens" class="form-label">Max Tokens</label>
                            <input type="number" class="form-control" id="maxTokens" th:field="*{maxTokens}"
                                   min="1" required/>
                        </div>
                        <div class="col-md-3">
                            <label for="maxDiffCharsPerChunk" class="form-label">Max Diff Chars/Chunk</label>
                            <input type="number" class="form-control" id="maxDiffCharsPerChunk"
                                   th:field="*{maxDiffCharsPerChunk}" min="1" required/>
                        </div>
                        <div class="col-md-3">
                            <label for="maxDiffChunks" class="form-label">Max Diff Chunks</label>
                            <input type="number" class="form-control" id="maxDiffChunks"
                                   th:field="*{maxDiffChunks}" min="1" required/>
                        </div>
                        <div class="col-md-3">
                            <label for="retryTruncatedChunkChars" class="form-label">Retry Truncated Chars</label>
                            <input type="number" class="form-control" id="retryTruncatedChunkChars"
                                   th:field="*{retryTruncatedChunkChars}" min="1" required/>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Save
                        </button>
                        <a th:href="@{/ai-integrations}" class="btn btn-secondary ms-2">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/
            const defaultApiUrls = /*[[${defaultApiUrls}]]*/ {};
            const suggestedModels = /*[[${suggestedModels}]]*/ {};
            const isEditMode = /*[[${integration.id != null}]]*/ false;

            document.addEventListener('DOMContentLoaded', function() {
                const providerSelect = document.getElementById('providerType');
                const apiUrlInput = document.getElementById('apiUrl');
                const apiUrlHint = document.getElementById('apiUrlHint');
                const modelInput = document.getElementById('model');
                const modelDropdownBtn = document.getElementById('modelDropdownBtn');
                const modelDropdownMenu = document.getElementById('modelDropdownMenu');
                const modelHint = document.getElementById('modelHint');

                function updateProviderDefaults() {
                    const provider = providerSelect.value;

                    // Update API URL hint and set default if empty (only for new integrations)
                    if (defaultApiUrls[provider]) {
                        apiUrlHint.textContent = 'Default: ' + defaultApiUrls[provider];
                        if (!isEditMode && (!apiUrlInput.value || apiUrlInput.value === defaultApiUrls[providerSelect.dataset.previousValue])) {
                            apiUrlInput.value = defaultApiUrls[provider];
                        }
                    } else {
                        apiUrlHint.textContent = '';
                    }

                    // Update model dropdown
                    const models = suggestedModels[provider] || [];
                    modelDropdownMenu.innerHTML = '';

                    if (models.length > 0) {
                        modelDropdownBtn.style.display = 'block';
                        modelHint.textContent = 'Suggested models: ' + models.join(', ');
                        models.forEach(function(modelName) {
                            const li = document.createElement('li');
                            const a = document.createElement('a');
                            a.className = 'dropdown-item';
                            a.href = '#';
                            a.textContent = modelName;
                            a.addEventListener('click', function(e) {
                                e.preventDefault();
                                modelInput.value = modelName;
                            });
                            li.appendChild(a);
                            modelDropdownMenu.appendChild(li);
                        });
                    } else {
                        modelDropdownBtn.style.display = 'none';
                        if (provider === 'ollama' || provider === 'llamacpp') {
                            modelHint.textContent = 'Enter the model name configured in your local ' + provider + ' instance';
                        } else {
                            modelHint.textContent = '';
                        }
                    }

                    providerSelect.dataset.previousValue = provider;
                }

                providerSelect.addEventListener('change', updateProviderDefaults);

                // Initialize on page load
                if (providerSelect.value) {
                    providerSelect.dataset.previousValue = providerSelect.value;
                    updateProviderDefaults();
                }
            });
            /*]]>*/
        </script>

    </div>
</div>
</body>
</html>
