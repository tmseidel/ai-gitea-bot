<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="color-scheme" content="light dark"/>
    <title th:text="${title} + ' - AI Gitea Bot'">AI Gitea Bot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}"/>
    <script>
        // Apply theme based on system preference immediately to prevent flash
        (function() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-bs-theme', prefersDark ? 'dark' : 'light');
        })();
    </script>
    <style>
        /* Ensure smooth transitions when theme changes */
        :root {
            color-scheme: light dark;
        }
        /* Custom styles for action buttons with gap */
        .btn-group-with-gap {
            display: flex;
            gap: 0.5rem;
        }
        .btn-group-with-gap .btn {
            border-radius: 0.375rem !important;
        }
    </style>
</head>
<body>

<!-- Layout fragment -->
<div th:fragment="layout(title, content)">
    <div th:replace="~{layout :: head(${title})}"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-robot"></i> AI Gitea Bot
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}"
                           th:classappend="${activeNav == 'dashboard'} ? 'active'">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/bots}"
                           th:classappend="${activeNav == 'bots'} ? 'active'">
                            <i class="bi bi-cpu"></i> Bots
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/ai-integrations}"
                           th:classappend="${activeNav == 'ai-integrations'} ? 'active'">
                            <i class="bi bi-stars"></i> AI Integrations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/git-integrations}"
                           th:classappend="${activeNav == 'git-integrations'} ? 'active'">
                            <i class="bi bi-git"></i> Git Integrations
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm">
                                <i class="bi bi-box-arrow-right"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:replace="${content}">
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Listen for system theme changes and update accordingly
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            document.documentElement.setAttribute('data-bs-theme', e.matches ? 'dark' : 'light');
        });
    </script>
</div>

</body>
</html>
