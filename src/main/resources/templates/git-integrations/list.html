<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:replace="~{layout :: layout('Git Integrations', ~{::pageContent})}">
    <div th:fragment="pageContent">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-git"></i> Git Integrations</h2>
            <a th:href="@{/git-integrations/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> New Integration
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${#lists.isEmpty(integrations)}" class="text-center py-4">
                    <i class="bi bi-inbox fs-1 text-muted"></i>
                    <p class="text-muted mt-2">No Git integrations configured yet.</p>
                    <a th:href="@{/git-integrations/new}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Add your first Git integration
                    </a>
                </div>
                <div th:if="${!#lists.isEmpty(integrations)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Provider Type</th>
                                <th>URL</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="integration : ${integrations}">
                                <td th:text="${integration.name}"></td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${integration.providerType}"></span>
                                </td>
                                <td th:text="${integration.url}"></td>
                                <td>
                                    <span th:if="${integration.createdAt != null}"
                                          th:text="${#temporals.format(integration.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                </td>
                                <td>
                                    <div class="btn-group-with-gap btn-group-sm">
                                        <a th:href="@{/git-integrations/{id}/edit(id=${integration.id})}"
                                           class="btn btn-outline-primary">
                                            <i class="bi bi-pencil"></i> Edit
                                        </a>
                                        <form th:action="@{/git-integrations/{id}/delete(id=${integration.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Are you sure you want to delete this Git integration?');">
                                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                                <i class="bi bi-trash"></i> Delete
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
