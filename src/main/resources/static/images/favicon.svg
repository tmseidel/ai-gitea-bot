<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#357abd"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="18" y="20" width="28" height="24" rx="4" fill="white"/>
  <!-- Eyes -->
  <circle cx="27" cy="30" r="3" fill="#4a90d9"/>
  <circle cx="37" cy="30" r="3" fill="#4a90d9"/>
  <!-- Mouth -->
  <rect x="24" y="37" width="16" height="3" rx="1.5" fill="#4a90d9"/>
  <!-- Antenna -->
  <line x1="32" y1="20" x2="32" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="3" fill="white"/>
  <!-- Code brackets -->
  <text x="10" y="54" font-family="monospace" font-size="14" font-weight="bold" fill="rgba(255,255,255,0.8)">&lt;/&gt;</text>
</svg>