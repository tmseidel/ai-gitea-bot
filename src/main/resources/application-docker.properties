spring.application.name=Anthropic Gitea Bot

# Gitea
gitea.url=${GITEA_URL:http://gitea:3000}
gitea.token=${GITEA_TOKEN:}

# Anthropic
anthropic.api.url=${ANTHROPIC_API_URL:https://api.anthropic.com}
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.version=${ANTHROPIC_API_VERSION:2023-06-01}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:4096}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Server
server.port=8080
